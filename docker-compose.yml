services:
  # The Database
  db:
    image: postgres:alpine
    environment:
      POSTGRES_USER: Birukdjn
      POSTGRES_PASSWORD: Birukdjn@8325
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # The Redis Cache
  cache:
    image: redis:alpine
    ports:
      - "6379:6379"

  # Your .NET 10 API
  api:
    image: ecommerce-api
    build:
      context: .
      dockerfile: Api/Dockerfile
    ports:
      - "5000:8080" # Map host 5000 to container 8080
    environment:
      - DatabaseOptions__ConnectionString=Host=db;Port=5432;Database=ecommerce;Username=Birukdjn;Password=Birukdjn@8325
      - ConnectionStrings__Redis=cache:6379
    depends_on:
      - db
      - cache

volumes:
  postgres_data: